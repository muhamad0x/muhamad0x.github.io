title: "muhamad0x"
description: "Bug Bounty Hunter · Red Team · Malware Research"
author: "muhamad0x"
email: ""
baseurl: ""
url: "https://muhamad0x.github.io"

# Social
github_username: muhamad0x
twitter_username: muhamad0x
hackerone_username: muhamad0x
linkedin_username: muhamad0x
discord_username: muhamad0x

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "muhamad0x"
